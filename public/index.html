<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eWallet Cassa - Gestione Lido</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen antialiased">

    <!-- Navbar Top Dynamic -->
    <nav class="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white p-4 shadow-lg border-b border-indigo-500/20 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl animate-pulse">🏖️</span>
                <h1 class="text-base font-black tracking-widest uppercase">LIDO EWALLET — <span class="text-indigo-400">CASSA CENTRALE</span></h1>
            </div>
            <div class="flex items-center space-x-2 bg-emerald-500/10 border border-emerald-500/30 px-3 py-1 rounded-full">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-ping"></span>
                <span class="text-emerald-400 text-xs font-bold uppercase tracking-wider">Terminale Attivo</span>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- SECTION: REGISTRAZIONE -->
        <section class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100 flex flex-col justify-between">
            <div>
                <div class="flex items-center space-x-2 mb-4 pb-2 border-b border-slate-100">
                    <span class="text-xl">🆕</span>
                    <h2 class="text-lg font-black tracking-tight text-slate-900">Registra Nuova Carta</h2>
                </div>
                
                <form id="registerForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">UID Carta (NFC)</label>
                        <div class="relative">
                            <input type="text" id="regUid" required autocomplete="off" placeholder="Passa la carta sul lettore..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 font-mono font-bold tracking-widest transition-all outline-none">
                            <span class="absolute right-3.5 top-3.5 opacity-30 text-lg">💳</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Nome Cliente / Ombrellone</label>
                        <div class="relative">
                            <input type="text" id="regName" placeholder="Es. Mario Rossi o Ombrellone 45" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 font-medium transition-all outline-none">
                            <span class="absolute right-3.5 top-3.5 opacity-30 text-lg">👤</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Carico Denaro Iniziale (€)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-3 text-slate-400 font-black text-lg">€</span>
                            <input type="number" id="regBalance" min="0" step="0.01" value="0.00" class="w-full p-3 pl-9 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 font-black text-indigo-600 text-lg transition-all outline-none">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-4 rounded-xl transition-all shadow-lg shadow-indigo-600/20 tracking-wider text-xs uppercase cursor-pointer">
                        Inizializza ed Associa Carta
                    </button>
                </form>
            </div>
        </section>

        <!-- SECTION: RICARICA -->
        <section class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100 flex flex-col justify-between">
            <div>
                <div class="flex items-center space-x-2 mb-4 pb-2 border-b border-slate-100">
                    <span class="text-xl">💰</span>
                    <h2 class="text-lg font-black tracking-tight text-slate-900">Ricarica Credito Carta</h2>
                </div>
                
                <form id="topupForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">UID Carta (NFC)</label>
                        <div class="relative">
                            <input type="text" id="topupUid" required autocomplete="off" placeholder="Passa la carta per ricaricare..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100 font-mono font-bold tracking-widest transition-all outline-none">
                            <span class="absolute right-3.5 top-3.5 opacity-30 text-lg">⚡</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Importo da Aggiungere (€)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-3 text-slate-400 font-black text-lg">€</span>
                            <input type="number" id="topupAmount" required min="0.01" step="0.01" placeholder="0.00" class="w-full p-3 pl-9 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100 font-black text-emerald-600 text-lg transition-all outline-none">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-4 rounded-xl transition-all shadow-lg shadow-emerald-600/20 tracking-wider text-xs uppercase cursor-pointer">
                        Conferma Ricarica Cassa
                    </button>
                </form>
            </div>
        </section>

    </main>

    <!-- Notification Toast System -->
    <div id="toast" class="hidden fixed bottom-6 right-6 text-white px-6 py-4 rounded-2xl shadow-2xl font-bold transition-all duration-300 transform translate-y-12 flex items-center space-x-3 z-50 border backdrop-blur-md"></div>

    <script>
        // Endpoint relativo pulito per eliminare bug degli slash
        const API_URL = '/api';

        // Set focus automatico all'avvio
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('regUid').focus();
        });

        // Toast Handler
        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            toast.innerHTML = isSuccess 
                ? `<span>🎉</span> <span class="text-sm font-semibold tracking-wide">${message}</span>` 
                : `<span>⚠️</span> <span class="text-sm font-semibold tracking-wide">${message}</span>`;
            
            toast.className = `fixed bottom-6 right-6 text-white px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 flex items-center space-x-3 z-50 border ${
                isSuccess 
                ? 'bg-slate-900/95 border-emerald-500/30 text-emerald-400 shadow-emerald-950/20' 
                : 'bg-rose-950/95 border-rose-500/30 text-rose-400 shadow-rose-950/20'
            }`;
            
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        // MANAGEMENT: REGISTRAZIONE
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                uid: document.getElementById('regUid').value.trim(),
                name: document.getElementById('regName').value.trim(),
                initial_balance: document.getElementById('regBalance').value
            };

            try {
                const response = await fetch(`${API_URL}/register-tag`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast(`Carta registrata con successo! Ospite: ${payload.name || 'Generico'}`);
                    document.getElementById('registerForm').reset();
                    document.getElementById('regBalance').value = "0.00";
                    document.getElementById('regUid').focus();
                } else {
                    showToast(`Errore: ${data.error}`, false);
                }
            } catch (err) {
                showToast("Errore di comunicazione con il server cloud", false);
            }
        });

        // MANAGEMENT: RICARICA
        document.getElementById('topupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                uid: document.getElementById('topupUid').value.trim(),
                amount: document.getElementById('topupAmount').value
            };

            try {
                const response = await fetch(`${API_URL}/topup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (data.success) {
                    showToast(`Ricarica eseguita! Nuovo Saldo: €${parseFloat(data.new_balance).toFixed(2)}`);
                    document.getElementById('topupForm').reset();
                    document.getElementById('topupUid').focus();
                } else {
                    showToast(`Errore: ${data.error}`, false);
                }
            } catch (err) {
                showToast("Errore di comunicazione con il server cloud", false);
            }
        });
    </script>
</body>
</html>
