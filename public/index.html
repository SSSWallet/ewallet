<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eWallet Cassa - Gestione Lido</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800 antialiased selection:bg-sky-500 selection:text-white">

    <!-- Navbar Superiore Elegante -->
    <nav class="bg-gradient-to-r from-sky-600 via-blue-600 to-indigo-700 text-white p-4 shadow-lg sticky top-0 z-40 backdrop-blur-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl animate-pulse">🏖️</span>
                <h1 class="text-lg font-black tracking-wider uppercase">Lido eWallet <span class="text-sky-200 font-normal text-xs lowercase bg-sky-500/30 px-2 py-0.5 rounded-full border border-sky-400/20">v2.0</span></h1>
            </div>
            <div class="flex items-center space-x-2">
                <span class="w-2.5 h-2.5 bg-emerald-400 rounded-full animate-ping"></span>
                <span class="bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 px-3 py-1 rounded-full text-xs font-black tracking-wide uppercase">Cassa Online</span>
            </div>
        </div>
    </nav>

    <!-- Contenitore Principale Stretto e Pulito -->
    <main class="max-w-xl mx-auto px-4 py-8">
        
        <!-- Switcher delle schede (Menu Operazione) -->
        <div class="bg-slate-200/70 p-1.5 rounded-2xl flex space-x-1 mb-6 shadow-inner border border-slate-300/50">
            <button id="tabRegBtn" onclick="switchTab('reg')" class="flex-1 py-3 text-sm font-black tracking-wide uppercase rounded-xl transition-all cursor-pointer bg-white text-blue-600 shadow-sm">
                ➕ Nuova Scheda
            </button>
            <button id="tabTopupBtn" onclick="switchTab('topup')" class="flex-1 py-3 text-sm font-black tracking-wide uppercase rounded-xl transition-all cursor-pointer text-slate-600 hover:text-slate-900">
                ⚡ Ricarica Credito
            </button>
        </div>

        <!-- SEZIONE 1: REGISTRAZIONE NUOVA CARTA -->
        <section id="sectionRegister" class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 transition-all">
            <div class="mb-5">
                <h2 class="text-xl font-black text-slate-900 tracking-tight">Inizializza Tessera</h2>
                <p class="text-xs text-slate-400 mt-0.5">Assegna un codice UID vergine a un nuovo ospite del lido.</p>
            </div>
            
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">1. UID Carta (Passa sul lettore)</label>
                    <div class="relative">
                        <input type="text" id="regUid" required autocomplete="off" placeholder="In attesa della lettura..." class="w-full p-3.5 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:bg-white text-base font-mono font-bold tracking-widest transition-all outline-none">
                        <span class="absolute right-3.5 top-3.5 text-xl opacity-40">💳</span>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">2. Nome Ospite / Numero Ombrellone</label>
                    <input type="text" id="regName" placeholder="Es. Mario Rossi o Ombrellone 12" class="w-full p-3.5 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:bg-white transition-all outline-none font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">3. Carico Denaro Iniziale (€)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-400 font-bold text-lg">€</span>
                        <input type="number" id="regBalance" min="0" step="0.01" value="0.00" class="w-full p-3.5 pl-9 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:bg-white text-lg font-black transition-all outline-none text-blue-600">
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold p-4 rounded-xl transition-all cursor-pointer shadow-md shadow-blue-500/10 tracking-wider text-sm uppercase mt-2">
                    🚀 Associa e Attiva Tessera
                </button>
            </form>
        </section>

        <!-- SEZIONE 2: RICARICA CREDITO (Nascosta all'avvio) -->
        <section id="sectionTopup" class="hidden bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 transition-all">
            <div class="mb-5">
                <h2 class="text-xl font-black text-slate-900 tracking-tight">Ricarica Rapida Cassa</h2>
                <p class="text-xs text-slate-400 mt-0.5">Aggiungi credito digitale su una tessera già esistente.</p>
            </div>
            
            <form id="topupForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">UID Carta (Passa sul lettore)</label>
                    <div class="relative">
                        <input type="text" id="topupUid" required autocomplete="off" placeholder="In attesa della lettura..." class="w-full p-3.5 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-emerald-500 focus:bg-white text-base font-mono font-bold tracking-widest transition-all outline-none">
                        <span class="absolute right-3.5 top-3.5 text-xl opacity-40">⚡</span>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Importo Cash da Aggiungere (€)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-400 font-bold text-lg">€</span>
                        <input type="number" id="topupAmount" required min="0.01" step="0.01" placeholder="0.00" class="w-full p-3.5 pl-9 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-emerald-500 focus:bg-white text-lg font-black transition-all outline-none text-emerald-600">
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold p-4 rounded-xl transition-all cursor-pointer shadow-md shadow-emerald-500/10 tracking-wider text-sm uppercase mt-2">
                    💰 Conferma ed Incassa Ricarica
                </button>
            </form>
        </section>

    </main>

    <!-- Notifiche Toast di Design -->
    <div id="toast" class="hidden fixed bottom-6 right-6 text-white px-6 py-4 rounded-2xl shadow-2xl font-bold transition-all duration-300 transform translate-y-12 flex items-center space-x-3 z-50 max-w-sm border backdrop-blur-sm"></div>

    <script>
        // Endpoint relativo corretto per evitare bug con le barre doppie
        const API_URL = '/api';

        // Sistema di navigazione a Tab
        function switchTab(tab) {
            const regBtn = document.getElementById('tabRegBtn');
            const topupBtn = document.getElementById('tabTopupBtn');
            const regSec = document.getElementById('sectionRegister');
            const topupSec = document.getElementById('sectionTopup');

            if (tab === 'reg') {
                regBtn.className = "flex-1 py-3 text-sm font-black tracking-wide uppercase rounded-xl transition-all cursor-pointer bg-white text-blue-600 shadow-sm";
                topupBtn.className = "flex-1 py-3 text-sm font-black tracking-wide uppercase rounded-xl transition-all cursor-pointer text-slate-600 hover:text-slate-900";
                regSec.classList.remove('hidden');
                topupSec.classList.add('hidden');
                document.getElementById('regUid').focus();
            } else {
                topupBtn.className = "flex-1 py-3 text-sm font-black tracking-wide uppercase rounded-xl transition-all cursor-pointer bg-white text-emerald-600 shadow-sm";
                regBtn.className = "flex-1 py-3 text-sm font-black tracking-wide uppercase rounded-xl transition-all cursor-pointer text-slate-600 hover:text-slate-900";
                topupSec.classList.remove('hidden');
                regSec.classList.add('hidden');
                document.getElementById('topupUid').focus();
            }
        }

        // Sistema Toast Notifiche Avanzato
        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            toast.innerHTML = isSuccess 
                ? `<span>🎉</span> <span class="text-sm font-semibold tracking-wide">${message}</span>` 
                : `<span>⚠️</span> <span class="text-sm font-semibold tracking-wide">${message}</span>`;
            
            toast.className = `fixed bottom-6 right-6 text-white px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 flex items-center space-x-3 z-50 max-w-sm border ${
                isSuccess 
                ? 'bg-emerald-600/95 border-emerald-500/50 shadow-emerald-900/20' 
                : 'bg-rose-600/95 border-rose-500/50 shadow-rose-900/20'
            }`;
            
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4500);
        }

        // Focus iniziale automatico sul primo campo UID
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('regUid').focus();
        });

        // ENVIO DATI REGISTRAZIONE
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                uid: document.getElementById('regUid').value.trim(),
                name: document.getElementById('regName').value.trim(),
                initial_balance: document.getElementById('regBalance').value
            };

            try {
                const response = await fetch(`${API_URL}/register-tag`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast(`Tessera attivata con successo per: ${payload.name || 'Ospite Anonimo'}`);
                    document.getElementById('registerForm').reset();
                    document.getElementById('regBalance').value = "0.00";
                    document.getElementById('regUid').focus();
                } else {
                    showToast(`Errore: ${data.error}`, false);
                }
            } catch (err) {
                showToast("Impossibile connettersi al server cloud.", false);
            }
        });

        // ENVIO DATI RICARICA
        document.getElementById('topupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                uid: document.getElementById('topupUid').value.trim(),
                amount: document.getElementById('topupAmount').value
            };

            try {
                const response = await fetch(`${API_URL}/topup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (data.success) {
                    showToast(`Ricarica eseguita! Nuovo Saldo: €${parseFloat(data.new_balance).toFixed(2)}`);
                    document.getElementById('topupForm').reset();
                    document.getElementById('topupUid').focus();
                } else {
                    showToast(`Errore: ${data.error}`, false);
                }
            } catch (err) {
                showToast("Impossibile connettersi al server cloud.", false);
            }
        });
    </script>
</body>
</html>
